name: IPL Betting Bot

on:
  # Run every 5 minutes during IPL hours (14:00-23:00 IST = 08:30-17:30 UTC)
  schedule:
    - cron: '*/5 8-17 * * *'
  # Also allow manual trigger
  workflow_dispatch:

jobs:
  arb-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    env:
      ODDS_API_KEY:        ${{ secrets.ODDS_API_KEY }}
      ODDSPAPI_KEY:        ${{ secrets.ODDSPAPI_KEY }}
      POLY_PRIVATE_KEY:    ${{ secrets.POLY_PRIVATE_KEY }}
      POLY_API_KEY:        ${{ secrets.POLY_API_KEY }}
      POLY_API_SECRET:     ${{ secrets.POLY_API_SECRET }}
      POLY_API_PASSPHRASE: ${{ secrets.POLY_API_PASSPHRASE }}
      ARB_BANK_USD:        "50"
      MIN_PROFIT_PCT:      "0.5"
      POLY_AUTO:           "1"
      BETFAIR_USERNAME:    ${{ secrets.BETFAIR_USERNAME }}
      BETFAIR_PASSWORD:    ${{ secrets.BETFAIR_PASSWORD }}
      BETFAIR_APP_KEY:     ${{ secrets.BETFAIR_APP_KEY }}
      BF_BANK_GBP:         "50"
      BF_STAKE_PCT:        "5"
      BF_GREEN_PCT:        "30"
      BF_DRY_RUN:          ${{ secrets.BF_DRY_RUN || '1' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install httpx py-clob-client eth-account python-dotenv betfairlightweight

      - name: Auto-derive Polymarket API creds if missing
        if: env.POLY_PRIVATE_KEY != '' && env.POLY_API_KEY == ''
        run: |
          python - <<'EOF'
          import os
          from py_clob_client.client import ClobClient
          from py_clob_client.constants import POLYGON
          key = os.environ["POLY_PRIVATE_KEY"]
          client = ClobClient("https://clob.polymarket.com", key=key, chain_id=int(POLYGON))
          creds = client.create_or_derive_api_creds()
          print(f"::notice::POLY_API_KEY={creds.api_key}")
          # Write to env file for subsequent steps
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"POLY_API_KEY={creds.api_key}\n")
              f.write(f"POLY_API_SECRET={creds.api_secret}\n")
              f.write(f"POLY_API_PASSPHRASE={creds.api_passphrase}\n")
          print("Polymarket API creds derived successfully.")
          EOF

      - name: Run arb scanner (single pass)
        run: python arb_bot.py --once

      - name: Run polymarket bot (single pass)
        run: python polymarket_bot.py --once
        continue-on-error: true

      - name: Run Betfair cricket trading bot (single pass)
        run: python betfair_bot.py --once
        continue-on-error: true
