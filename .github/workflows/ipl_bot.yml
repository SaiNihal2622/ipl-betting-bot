name: IPL Betting Bot

# ─────────────────────────────────────────────────────────────────────────────
# IPL 2026 match schedule (all times IST = UTC+5:30):
#
#   WEEKDAYS  (Mon–Fri): single match at 19:30 IST → analysis from 19:00 IST
#     19:00 IST = 13:30 UTC  → first trigger
#     19:30–23:30 IST        → every 5 min (14:00–18:00 UTC)
#
#   WEEKENDS  (Sat–Sun): two matches
#     Match 1 → 15:30 IST = 10:00 UTC  → analysis from 15:00 IST = 09:30 UTC
#     Match 2 → 19:30 IST = 14:00 UTC  → analysis from 19:00 IST = 13:30 UTC
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [ master ]
  schedule:
    # ── Weekdays: single evening match ──────────────────────────────────────
    - cron: '30 13 * * 1-5'      # 19:00 IST Mon-Fri  — pre-match analysis
    - cron: '*/5 14-18 * * 1-5'  # 19:30-00:00 IST    — live trading every 5 min

    # ── Weekends: afternoon match (Match 1) ──────────────────────────────────
    - cron: '30 9 * * 0,6'       # 15:00 IST Sat-Sun  — pre-match analysis
    - cron: '*/5 10-13 * * 0,6'  # 15:30-19:00 IST    — live trading every 5 min

    # ── Weekends: evening match (Match 2) ────────────────────────────────────
    - cron: '30 13 * * 0,6'      # 19:00 IST Sat-Sun  — pre-match analysis
    - cron: '*/5 14-18 * * 0,6'  # 19:30-00:00 IST    — live trading every 5 min

  workflow_dispatch:              # manual trigger anytime

jobs:
  trade:
    runs-on: ubuntu-latest
    timeout-minutes: 4

    env:
      # ── Cloudbet ──────────────────────────────────────────────────────────
      CLOUDBET_API_KEY:    ${{ secrets.CLOUDBET_API_KEY }}
      CB_DRY_RUN:          ${{ secrets.CB_DRY_RUN || '1' }}
      CB_STAKE:            ${{ secrets.CB_STAKE || '2.0' }}
      CB_CURRENCY:         ${{ secrets.CB_CURRENCY || 'USDT' }}
      CB_BANKROLL:         ${{ secrets.CB_BANKROLL || '30.0' }}

      # ── AI (Gemini primary, Groq fallback, NVIDIA consensus) ──────────────
      GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL:        "gemini-2.0-flash"
      GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
      GROQ_MODEL:          "llama-3.1-8b-instant"
      NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}
      NVIDIA_MODEL:        "nvidia/llama-3.1-nemotron-70b-instruct"
      STRICT_CONSENSUS:    ${{ secrets.STRICT_CONSENSUS || 'true' }}
      CONSENSUS_THRESHOLD: ${{ secrets.CONSENSUS_THRESHOLD || '0.80' }}
      MIMO_API_KEY:        ${{ secrets.MIMO_API_KEY }}
      MIMO_BASE_URL:       ${{ secrets.MIMO_BASE_URL }}

      # ── Data sources ──────────────────────────────────────────────────────
      ODDS_API_KEY:        ${{ secrets.ODDS_API_KEY }}

      # ── Polymarket (optional) ─────────────────────────────────────────────
      POLY_PRIVATE_KEY:    ${{ secrets.POLY_PRIVATE_KEY }}
      POLY_API_KEY:        ${{ secrets.POLY_API_KEY }}
      POLY_API_SECRET:     ${{ secrets.POLY_API_SECRET }}
      POLY_API_PASSPHRASE: ${{ secrets.POLY_API_PASSPHRASE }}
      POLY_AUTO:           "1"

      # ── Betfair (optional) ────────────────────────────────────────────────
      BETFAIR_USERNAME:    ${{ secrets.BETFAIR_USERNAME }}
      BETFAIR_PASSWORD:    ${{ secrets.BETFAIR_PASSWORD }}
      BETFAIR_APP_KEY:     ${{ secrets.BETFAIR_APP_KEY }}
      BF_DRY_RUN:          ${{ secrets.BF_DRY_RUN || '1' }}
      BF_BANK_GBP:         "50"
      BF_STAKE_PCT:        "5"
      BF_GREEN_PCT:        "30"

      # ── Arb bot ───────────────────────────────────────────────────────────
      ARB_BANK_USD:        "50"
      MIN_PROFIT_PCT:      "0.5"

    steps:
      - uses: actions/checkout@v4

      # Restore position state between runs
      # Weekend: separate cache keys for afternoon vs evening match
      - name: Determine match slot
        id: slot
        run: |
          HOUR_UTC=$(date -u +%H)
          DAY=$(date -u +%u)   # 1=Mon … 7=Sun
          if [ "$DAY" -ge 6 ] && [ "$HOUR_UTC" -lt 13 ]; then
            echo "slot=afternoon" >> $GITHUB_OUTPUT
          else
            echo "slot=evening" >> $GITHUB_OUTPUT
          fi

      - name: Restore position state
        uses: actions/cache@v4
        with:
          path: cloudbet_positions.json
          key: cloudbet-positions-${{ steps.slot.outputs.slot }}-${{ github.run_id }}
          restore-keys: cloudbet-positions-${{ steps.slot.outputs.slot }}-

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install httpx python-dotenv betfairlightweight \
                      scikit-learn pandas numpy \
                      py-clob-client eth-account

      - name: Auto-derive Polymarket creds (if needed)
        if: env.POLY_PRIVATE_KEY != '' && env.POLY_API_KEY == ''
        run: |
          python - <<'EOF'
          import os
          from py_clob_client.client import ClobClient
          from py_clob_client.constants import POLYGON
          key = os.environ["POLY_PRIVATE_KEY"]
          client = ClobClient("https://clob.polymarket.com", key=key, chain_id=int(POLYGON))
          creds = client.create_or_derive_api_creds()
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write(f"POLY_API_KEY={creds.api_key}\n")
              f.write(f"POLY_API_SECRET={creds.api_secret}\n")
              f.write(f"POLY_API_PASSPHRASE={creds.api_passphrase}\n")
          print("Polymarket creds derived.")
          EOF

      - name: Run arb scanner
        run: python arb_bot.py --once
        continue-on-error: true

      - name: Run Polymarket bot
        run: python polymarket_bot.py --once
        continue-on-error: true

      - name: Run Betfair bot
        run: python betfair_bot.py --once
        continue-on-error: true

      - name: Run Cloudbet scheduled bot
        run: python cloudbet_bot.py --once
        continue-on-error: true

      # Main live trader — loops 3.5 min, catches every open window between balls
      - name: Run Cloudbet LIVE trader (ML + Gemini AI + Kelly)
        run: python cloudbet_live.py --loop --duration=200
        continue-on-error: true

      # Save updated position state for next run (slot-aware)
      - name: Save position state
        uses: actions/cache@v4
        with:
          path: |
            cloudbet_positions.json
            trader_stats.json
          key: cloudbet-positions-${{ steps.slot.outputs.slot }}-${{ github.run_id }}

      - name: Commit and push changes
        run: |
          git config --global user.name "VibeBot"
          git config --global user.email "bot@vibecode.bible"
          git add trader_stats.json ipl_live.log cloudbet_positions.json
          git commit -m "chore: update trading stats and logs [skip ci]" || echo "No changes to commit"
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
